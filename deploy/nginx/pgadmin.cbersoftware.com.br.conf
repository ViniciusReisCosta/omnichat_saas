# pgAdmin — pgadmin.cbersoftware.com.br
# Proxies to the pgAdmin Docker container published on 127.0.0.1:5050.
# Install:  sudo cp deploy/nginx/pgadmin.cbersoftware.com.br.conf /etc/nginx/sites-available/pgadmin.cbersoftware.com.br
#           sudo ln -s /etc/nginx/sites-available/pgadmin.cbersoftware.com.br /etc/nginx/sites-enabled/
# Then run certbot (see DEPLOYMENT.md) to add HTTPS automatically.

server {
    listen 80;
    listen [::]:80;
    server_name pgadmin.cbersoftware.com.br;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
