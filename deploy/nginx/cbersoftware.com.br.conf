# Main site — cbersoftware.com.br + www.cbersoftware.com.br
# Serves the Next.js app (frontend + /api) running under pm2 on port 3000.
# Install:  sudo cp deploy/nginx/cbersoftware.com.br.conf /etc/nginx/sites-available/cbersoftware.com.br
#           sudo ln -s /etc/nginx/sites-available/cbersoftware.com.br /etc/nginx/sites-enabled/
# Then run certbot (see DEPLOYMENT.md) to add HTTPS automatically.

upstream omniconnect_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name cbersoftware.com.br www.cbersoftware.com.br;

    client_max_body_size 25M;

    # Next.js static build assets — cache aggressively.
    location /_next/static/ {
        proxy_pass http://omniconnect_app;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://omniconnect_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
