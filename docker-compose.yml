services:
  postgres:
    image: postgres:16-alpine
    container_name: cberhunt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Exposed on localhost only — the Next.js app (pm2) connects via 127.0.0.1:5432.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cberhunt_pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      # Tell pgAdmin it sits behind an HTTPS reverse proxy (nginx).
      PGADMIN_CONFIG_PROXY_X_HOST_COUNT: "1"
      PGADMIN_CONFIG_PROXY_X_PREFIX_COUNT: "1"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      # Exposed on localhost only — nginx proxies pgadmin.cbersoftware.com.br -> 127.0.0.1:5050
      - "127.0.0.1:5050:80"

volumes:
  postgres_data:
  pgadmin_data:
